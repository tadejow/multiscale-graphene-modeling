# configs/ml_model/mlp_config.yaml
paths:
  data_archive: "../data/data_fireball/RESULTS.tgz"
  extract_dir: "../data/data_fireball/extracted_results"
  learning_output_dir: "../data/data_learning"

model:
  input_dim: 5          # [d1, d2, d3, v_F, D(E_F)]
  hidden_dims: [64, 64, 32] # Architektura znormalizowana
  output_dim: 1         # Kinematyczna lepkość (nu)

training:
  batch_size: 16
  epochs: 500
  learning_rate: 0.001
  weight_decay: 0.0001  # Tikhonov L2 Regularization (lambda)
  test_split: 0.2
  random_seed: 42